{{- if hugo.IsProduction | or (eq site.Params.env "production") }}
<script>
(function(){
  if(!navigator.sendBeacon)return;
  navigator.sendBeacon("/api/ping",JSON.stringify({
    p:location.pathname,
    r:document.referrer,
    sw:screen.width,
    sh:screen.height,
    ua:navigator.userAgent,
    t:Date.now()
  }));
})();
</script>
{{- end }}
